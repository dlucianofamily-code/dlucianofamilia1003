<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pendaftaran Terkirim - Lady Gangster</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body {
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(20, 0, 40, 0.8)), url('uhui.png'); 
            background-size: cover;
            background-attachment: fixed;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .login-box {
            background: rgba(10, 10, 10, 0.9);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(155, 89, 182, 0.2);
            width: 450px;
            text-align: center;
            animation: slideUp 0.6s ease-out;
            color: white;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto;
            border: 3px solid #9b59b6;
            box-shadow: 0 0 20px rgba(155, 89, 182, 0.3);
        }
        h1 { color: #9b59b6; margin-top: 20px; text-transform: uppercase; }
        p { color: #bbb; margin: 15px 0 30px 0; }
        .btn-back {
            width: 100%;
            padding: 14px;
            background: #8e44ad;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            display: block;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover { background: #9b59b6; box-shadow: 0 0 20px rgba(155, 89, 182, 0.5); }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="success-icon">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="#9b59b6" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="20 6 9 17 4 12"></polyline>
            </svg>
        </div>
        <h1>Berhasil!</h1>
        <p>Data pendaftaran <strong>Lady Gangster</strong> telah terkirim ke Discord <strong>𝔇 ' 𝔏𝔲𝔠𝔦𝔞𝔫𝔬</strong>.</p>
        <a href="tetst.html" class="btn-back">KEMBALI KE BERANDA</a>
    </div>
</body>
</html>
